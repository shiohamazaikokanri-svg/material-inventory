{% load static %}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>材料在庫管理</title>
  <link rel="stylesheet" href="{% static 'inventory/styles.css' %}">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="{% url 'inventory:material_list' %}">材料在庫管理</a>
    <nav>
      <a href="{% url 'inventory:material_list' %}">材料一覧</a>
      <a href="{% url 'inventory:import_excel' %}">Excel取込</a>
    </nav>
  </header>

  <main class="shell">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
